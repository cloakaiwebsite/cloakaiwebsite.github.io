<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E78JBBWJQW"></script>
  <script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>CloakAI - License Ready</title>
  <style>
    :root{--pg:#0f3d2e;--ag:#2ecc71;--gg:#00ff88;--bg:#050a07;--tc:#e0e0e0;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}

    body{
      background:var(--bg);color:var(--tc);min-height:100vh;
      display:flex;flex-direction:column;align-items:center;
      justify-content:flex-start;padding:16px 16px 40px;
      background:radial-gradient(circle at 50% 30%,rgba(15,61,46,.4) 0%,transparent 60%),
                 linear-gradient(0deg,#050a07 0%,#0a1410 100%);
    }

    .card{
      background:linear-gradient(160deg,#0A0F1A,#060C16);
      border:1px solid rgba(52,211,153,.25);border-radius:22px;
      padding:32px 24px;max-width:520px;width:100%;text-align:center;
      box-shadow:0 0 60px rgba(52,211,153,.07),0 24px 64px rgba(0,0,0,.6);
      position:relative;overflow:hidden;margin-top:16px;
    }
    .card::before{
      content:'';position:absolute;top:-1px;left:10%;right:10%;
      height:2px;background:linear-gradient(90deg,transparent,#34D399,transparent);
    }

    .logo{
      font-size:1.2rem;font-weight:800;color:var(--gg);letter-spacing:.5px;
      margin-bottom:22px;display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .logo svg{width:22px;height:22px;fill:var(--gg);}

    .check-circle{
      width:58px;height:58px;border-radius:50%;
      background:rgba(52,211,153,.12);border:2px solid #34D399;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 16px;font-size:24px;color:#34D399;
    }

    h1{font-size:1.65rem;font-weight:800;color:#fff;margin-bottom:6px;line-height:1.2;}
    .subtitle{color:#64748B;font-size:.86rem;line-height:1.65;margin-bottom:16px;}

    .plan-badge{
      display:inline-block;background:rgba(52,211,153,.1);
      border:1px solid rgba(52,211,153,.25);color:#34D399;
      padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:600;
      margin-bottom:16px;
    }

    .key-label{
      color:#475569;font-size:.73rem;font-weight:600;
      text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;
    }
    .key-box{
      font-family:'Consolas','Courier New',monospace;
      font-size:1.25rem;font-weight:700;letter-spacing:2px;
      color:#34D399;background:rgba(2,44,34,.6);
      border:1px solid rgba(52,211,153,.3);border-radius:12px;
      padding:15px 10px;margin-bottom:12px;
      word-break:break-all;line-height:1.5;
    }

    .btn-copy{
      width:100%;padding:13px;border-radius:11px;border:none;
      background:linear-gradient(135deg,#059669,#34D399);
      color:#022c22;font-size:.97rem;font-weight:800;cursor:pointer;
      transition:.2s;margin-bottom:18px;display:block;
    }
    .btn-copy:hover{opacity:.9;transform:translateY(-1px);}
    .btn-copy.copied{background:linear-gradient(135deg,#065f46,#10b981);}

    /* Steps */
    .steps{text-align:left;margin-bottom:18px;}
    .step{
      display:flex;align-items:flex-start;gap:11px;
      padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04);
    }
    .step:last-child{border-bottom:none;}
    .step-num{
      width:22px;height:22px;border-radius:50%;flex-shrink:0;
      background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);
      color:#34D399;font-size:.75rem;font-weight:700;
      display:flex;align-items:center;justify-content:center;margin-top:2px;
    }
    .step-text{font-size:.85rem;color:#94A3B8;line-height:1.55;}
    .step-text strong{color:#cbd5e1;}

    /* Email note — plain block layout, no flex, no columns, mobile-safe */
    .email-note{
      background:rgba(56,189,248,.05);
      border:1px solid rgba(56,189,248,.12);
      border-radius:10px;padding:13px 14px;margin-bottom:14px;
      font-size:.83rem;color:#64748B;line-height:1.8;
      text-align:left;word-break:break-word;
    }
    .email-note .note-title{
      display:block;color:#7dd3fc;font-weight:600;
      margin-bottom:5px;font-size:.84rem;
    }

    small{
      display:block;color:#1e2e1e;font-size:.73rem;
      margin-bottom:16px;line-height:1.7;
    }
    small a{color:#2ecc71;text-decoration:none;}

    /* Action buttons */
    .btn-home{
      display:block;width:100%;padding:13px;border-radius:11px;
      font-size:.97rem;font-weight:700;cursor:pointer;text-decoration:none;
      text-align:center;transition:.2s;margin-bottom:10px;
      background:linear-gradient(45deg,var(--pg),var(--ag));
      color:#fff;border:1px solid var(--gg);
      box-shadow:0 0 14px rgba(46,204,113,.2);
    }
    .btn-home:hover{box-shadow:0 0 22px rgba(46,204,113,.35);transform:translateY(-1px);}

    .btn-sec{
      display:block;width:100%;padding:11px;border-radius:11px;
      font-size:.9rem;font-weight:500;cursor:pointer;text-decoration:none;
      text-align:center;transition:.2s;
      border:1px solid rgba(52,211,153,.25);
      background:rgba(52,211,153,.06);color:#34D399;
    }
    .btn-sec:hover{background:rgba(52,211,153,.12);}

    /* Error card */
    .error-card{border-color:rgba(239,68,68,.25);}

    /* Footer */
    footer{
      width:100%;max-width:520px;margin-top:20px;
      text-align:center;padding-bottom:20px;
    }
    .footer-links{
      display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:8px;
    }
    .footer-links a{color:#222;text-decoration:none;font-size:.78rem;transition:.2s;}
    .footer-links a:hover{color:var(--gg);}
    .footer-copy{color:#1a1a1a;font-size:.72rem;}

    @media(max-width:400px){
      .card{padding:22px 14px;}
      h1{font-size:1.4rem;}
      .key-box{font-size:1.05rem;letter-spacing:1px;padding:13px 8px;}
      .btn-copy{font-size:.9rem;}
    }
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
    CloakAI
  </div>
  <div id="content"></div>
</div>

<footer>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="index.html#pricing">Pricing</a>
    <a href="how-to-use.html">How to use?</a>
    <a href="license-info.html">License Status</a>
    <a href="terms.html">Terms</a>
    <a href="privacy.html">Privacy</a>
    <a href="contact.html">Contact</a>
  </div>
  <div class="footer-copy">© 2025 CloakAI. All rights reserved. &nbsp;·&nbsp; support.cloakai@gmail.com</div>
</footer>

<script>
(function () {
  var params  = new URLSearchParams(window.location.search);
  var key     = (params.get('key')  || '').trim().toUpperCase();
  var plan    = (params.get('plan') || '').trim();
  var bypass  = params.get('bypass') === '1';
  var content = document.getElementById('content');
  var card    = document.getElementById('card');

  // ── No valid key in URL ───────────────────────────────────────────────────
  if (!key || !key.startsWith('CLAI-')) {
    card.classList.add('error-card');
    content.innerHTML =
      '<div class="check-circle" style="border-color:#EF4444;background:rgba(239,68,68,.1);color:#EF4444;">&#10005;</div>' +
      '<h1 style="color:#EF4444;">Something Went Wrong</h1>' +
      '<p class="subtitle" style="margin-bottom:16px;">We could not find your license key.<br>' +
      'Your key was emailed to you automatically after payment.<br>' +
      'Please check your inbox and spam folder.</p>' +
      '<div class="email-note">' +
        '<span class="note-title">Need help?</span>' +
        'Email us at <a href="mailto:support.cloakai@gmail.com" style="color:#34D399;">support.cloakai@gmail.com</a> ' +
        'and include your PhonePe transaction reference.' +
      '</div>' +
      '<a href="index.html" class="btn-home">Back to Home</a>';
    return;
  }

  // ── Plan display name ─────────────────────────────────────────────────────
  var PLANS = {
    day:'1 Day Access', week:'1 Week Access',
    month:'1 Month Access', quarter:'3 Month Access',
  };
  var planName = PLANS[plan] || plan || 'License';

  // ── Bypass banner (test mode only) ───────────────────────────────────────
  var bypassBanner = bypass
    ? '<div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);' +
      'color:#F59E0B;padding:8px 12px;border-radius:8px;font-size:.77rem;' +
      'font-weight:600;margin-bottom:16px;">Testing mode — payment bypass active</div>'
    : '';

  // ── Main success content ──────────────────────────────────────────────────
  content.innerHTML =
    bypassBanner +

    '<div class="check-circle">&#10003;</div>' +
    '<h1>Payment Confirmed!</h1>' +
    '<p class="subtitle">Your license key is ready. Save it somewhere safe.</p>' +
    '<div class="plan-badge">' + planName + '</div>' +

    '<div class="key-label">Your License Key</div>' +
    '<div class="key-box">' + key + '</div>' +
    '<button class="btn-copy" id="copy-btn" onclick="copyKey()">Copy License Key</button>' +

    '<div class="steps">' +
      '<div class="step"><div class="step-num">1</div>' +
        '<div class="step-text">Download and open <strong>CloakAI.exe</strong> on your Windows machine.</div></div>' +
      '<div class="step"><div class="step-num">2</div>' +
        '<div class="step-text">Paste the key above when prompted and click <strong>Activate</strong>.</div></div>' +
      '<div class="step"><div class="step-num">3</div>' +
        '<div class="step-text">Press <strong>F8</strong> to show or hide the overlay during your interview.</div></div>' +
    '</div>' +

    '<div class="email-note">' +
      '<span class="note-title">📧 Email sent</span>' +
      'Your license key and full order details have been sent to your registered email address. ' +
      'If you do not see it within a few minutes, check your spam or junk folder.' +
    '</div>' +

    '<small>License is bound to the first device it is activated on. Non-transferable.<br>' +
    'Questions? <a href="mailto:support.cloakai@gmail.com">support.cloakai@gmail.com</a></small>' +

    '<a href="index.html" class="btn-home">Back to Home</a>' +
    '<a href="license-info.html?key=' + encodeURIComponent(key) + '" class="btn-sec">View License Status</a>';

  // ── Copy key ──────────────────────────────────────────────────────────────
  window.copyKey = function () {
    var btn = document.getElementById('copy-btn');

    function onCopied() {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function () {
        btn.textContent = 'Copy License Key';
        btn.classList.remove('copied');
      }, 2500);
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(key).then(onCopied).catch(fallback);
    } else {
      fallback();
    }

    function fallback() {
      try {
        var ta = document.createElement('textarea');
        ta.value = key;
        ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        onCopied();
      } catch(e) {
        btn.textContent = 'Copy failed — select key manually';
      }
    }
  };

})();
</script>
</body>
</html>
